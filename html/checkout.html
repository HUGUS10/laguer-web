<section class="section">
  <div class="wrap">
    <h1>Finalizar compra</h1>
    <div style="display:grid; grid-template-columns:2fr 1fr; gap:30px; margin-top:30px;">
      <div>
        <h3>Datos de envío</h3>
        <form style="display:flex; flex-direction:column; gap:16px;">
          <input type="text" placeholder="Nombre completo" style="padding:12px; border-radius:10px; background:var(--surface); border:1px solid var(--line); color:#fff;">
          <input type="text" placeholder="Dirección" style="padding:12px; border-radius:10px; background:var(--surface); border:1px solid var(--line); color:#fff;">
          <input type="text" placeholder="Distrito / Ciudad" style="padding:12px; border-radius:10px; background:var(--surface); border:1px solid var(--line); color:#fff;">
        </form>
      </div>
      <div>
        <h3>Resumen</h3>
        <div class="card" style="padding:20px;">
          <p>Subtotal: S/ 299</p>
          <p>Envío: S/ 20</p>
          <hr style="border-color:var(--line); margin:12px 0;">
          <h3>Total: S/ 319</h3>
          <button class="add-btn" style="margin-top:16px;">Confirmar pedido</button>
        </div>
      </div>
    </div>
  </div>
</section>
