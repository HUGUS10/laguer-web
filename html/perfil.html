<section class="section">

        <label>Nombre completo</label>
        <input type="text" value="Usuario LAGUER" style="padding:12px; border-radius:10px; background:var(--surface); border:1px solid var(--line); color:#fff;">

        <input type="email" value="usuario@ejemplo.com" style="padding:12px; border-radius:10px; background:var(--surface); border:1px solid var(--line); color:#fff;">
