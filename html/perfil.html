<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LAGUER · Mi Perfil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
<style>
:root {
  --bg: #05070b; --bg-soft: #0b1017; --surface: #121a24; --surface-2: #1a2531; --surface-3: #1f2d3d;
  --line: rgba(255,255,255,.08); --line-hover: rgba(255,255,255,.15);
  --red: #ee1d25; --red-dark: #a5141a; --red-glow: rgba(238,29,37,.15);
  --blue: #189ee0; --blue-dark: #0f6ca3; --blue-glow: rgba(24,158,224,.15);
  --green: #39b54a; --green-dark: #1f7b2c; --green-glow: rgba(57,181,74,.15);
  --white: #f5f8fb; --muted: #8fa0b3; --muted-dark: #5a6a7a;
  --radius: 14px; --sidebar-width: 240px; --header-height: 64px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--white); font-family: 'Manrope', sans-serif; -webkit-font-smoothing: antialiased; overflow-x: hidden; font-size: 14px; }
h1,h2,h3,h4 { font-family: 'Space Grotesk', sans-serif; letter-spacing: -0.01em; }
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; }

.layout { display: flex; min-height: 100vh; }
.sidebar {
  width: var(--sidebar-width); background: var(--bg-soft); border-right: 1px solid var(--line);
  position: fixed; inset: 0 auto 0 0; z-index: 100; display: flex; flex-direction: column; padding: 24px 16px;
}
.sidebar-header { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; padding: 0 8px; }
.sidebar-header img { height: 28px; }
.sidebar-header .brand-text { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 18px; }
.sidebar-header .brand-text span { color: var(--red); }

.nav-item {
  display: flex; align-items: center; gap: 12px; padding: 10px 14px; margin-bottom: 4px; border-radius: 10px;
  font-size: 14px; font-weight: 600; color: var(--muted); cursor: pointer; transition: .2s;
}
.nav-item:hover { background: var(--surface-2); color: var(--white); }
.nav-item.active { background: linear-gradient(90deg, var(--red-glow), var(--blue-glow)); color: var(--white); border: 1px solid rgba(255,255,255,.06); }
.nav-item i { width: 20px; text-align: center; }

.sidebar-footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--line); }
.user-card { display: flex; align-items: center; gap: 10px; padding: 0 8px; }
.user-card .avatar {
  width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, var(--red), var(--blue));
  display: grid; place-items: center; font-weight: 700; font-size: 13px; color: #fff; flex-shrink: 0;
}
.user-card .info { flex: 1; }
.user-card .info div { font-weight: 700; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.user-card .info span { font-size: 11px; color: var(--muted); }

.main { flex: 1; margin-left: var(--sidebar-width); display: flex; flex-direction: column; }
.top-header {
  height: var(--header-height); background: rgba(5,7,11,.92); backdrop-filter: blur(10px);
  border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between;
  padding: 0 28px; position: sticky; top: 0; z-index: 50;
}
.page-content { padding: 24px 28px 40px; flex: 1; }
.page-section { display: none; }
.page-section.active { display: block; animation: fadeIn .45s cubic-bezier(.22,.6,.36,1); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

.card {
  background: linear-gradient(145deg, var(--surface) 0%, var(--surface-2) 100%); border: 1px solid var(--line);
  border-radius: var(--radius); margin-bottom: 20px; overflow: hidden;
}
.card-header { padding: 18px 20px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; }
.card-header h2 { font-size: 16px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
.card-body { padding: 18px 20px; }

.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); margin-bottom: 6px; }
.form-group input, .form-group select {
  width: 100%; background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 10px 14px;
  color: var(--white); font-family: inherit; font-size: 14px; outline: none; transition: border-color .2s;
}
.form-group input:focus, .form-group select:focus { border-color: var(--blue); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

.btn {
  display: inline-flex; align-items: center; gap: 8px; padding: 9px 18px; border-radius: 10px; font-weight: 700;
  font-size: 13px; transition: all .2s; border: 1px solid transparent; white-space: nowrap;
}
.btn-primary { background: linear-gradient(90deg, var(--red), var(--blue)); color: #fff; border: none; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(238,29,37,.35); }
.btn-secondary { background: var(--surface); color: var(--white); border: 1px solid var(--line); }
.btn-secondary:hover { background: var(--surface-2); border-color: var(--line-hover); }

.badge {
  display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px; border-radius: 99px; font-size: 11px;
  font-weight: 700; white-space: nowrap; border: 1px solid transparent;
}
.badge-info { background: var(--blue-glow); color: var(--blue); border-color: rgba(24,158,224,.2); }
.badge-success { background: var(--green-glow); color: var(--green); border-color: rgba(57,181,74,.2); }
.badge-warning { background: rgba(245,158,11,.12); color: #f59e0b; border-color: rgba(245,158,11,.2); }

.table-container { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th { text-align: left; padding: 14px 16px; font-weight: 700; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--muted); border-bottom: 1px solid var(--line); background: rgba(255,255,255,.02); }
tbody td { padding: 14px 16px; border-bottom: 1px solid var(--line); color: var(--white); vertical-align: middle; }
tbody tr:hover td { background: rgba(255,255,255,.035); }
.cell-muted { color: var(--muted); font-size: 12px; }

.logout-btn { color: var(--red); font-size: 13px; font-weight: 700; cursor: pointer; background: none; border: none; padding: 8px 0; }
.logout-btn:hover { text-decoration: underline; }

@media (max-width: 768px) {
  .sidebar { transform: translateX(-100%); transition: transform .3s; }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header"><img src="../image/favicon-laguer.png" /><div class="brand-text">LAGUER<span>.</span></div></div>
    <nav>
      <div class="nav-item active" onclick="showPage('profile')"><i class="fas fa-user"></i> Mi Perfil</div>
      <div class="nav-item" onclick="showPage('orders')"><i class="fas fa-shopping-bag"></i> Mis Pedidos</div>
      <div class="nav-item" onclick="showPage('coupons')"><i class="fas fa-ticket-alt"></i> Mis Cupones</div>
      <div class="nav-item" onclick="showPage('settings')"><i class="fas fa-cog"></i> Configuración</div>
    </nav>
    <div class="sidebar-footer">
      <div class="user-card">
        <div class="avatar" id="userAvatar">U</div>
        <div class="info"><div id="userName">Usuario</div><span id="userRole">Cliente</span></div>
      </div>
      <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Cerrar sesión</button>
    </div>
  </aside>

  <div class="main">
    <header class="top-header">
      <h2 style="font-size:18px; font-weight:700;">Mi Cuenta</h2>
    </header>
    <div class="page-content">
      <div id="page-profile" class="page-section active">
        <div class="card">
          <div class="card-header"><h2><i class="fas fa-user" style="color:var(--blue);"></i> Datos Personales</h2></div>
          <div class="card-body">
            <div class="form-row">
              <div class="form-group"><label>Nombre</label><input type="text" id="profileName"></div>
              <div class="form-group"><label>Correo</label><input type="email" id="profileEmail" readonly></div>
            </div>
            <div class="form-row">
              <div class="form-group"><label>Teléfono</label><input type="tel" id="profilePhone"></div>
              <div class="form-group"><label>Rol</label><input type="text" value="Cliente" readonly></div>
            </div>
            <button class="btn btn-primary" onclick="saveProfile()"><i class="fas fa-save"></i> Guardar cambios</button>
          </div>
        </div>
      </div>
      <div id="page-orders" class="page-section">
        <div class="card">
          <div class="card-header"><h2><i class="fas fa-shopping-bag" style="color:var(--green);"></i> Mis Pedidos</h2></div>
          <div class="card-body">
            <div class="table-container">
              <table>
                <thead><tr><th>Pedido</th><th>Fecha</th><th>Total</th><th>Estado</th></tr></thead>
                <tbody id="ordersTable">
                  <tr><td colspan="4" class="cell-muted" style="text-align:center;">No tienes pedidos aún.</td></tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
      <div id="page-coupons" class="page-section">
        <div class="card">
          <div class="card-header"><h2><i class="fas fa-ticket-alt" style="color:var(--red);"></i> Mis Cupones</h2></div>
          <div class="card-body">
            <p class="cell-muted" style="text-align:center;">No tienes cupones activos.</p>
          </div>
        </div>
      </div>
      <div id="page-settings" class="page-section">
        <div class="card">
          <div class="card-header"><h2><i class="fas fa-cog" style="color:var(--muted);"></i> Configuración</h2></div>
          <div class="card-body">
            <div class="form-group"><label>Contraseña actual</label><input type="password" id="currentPass"></div>
            <div class="form-group"><label>Nueva contraseña</label><input type="password" id="newPass"></div>
            <button class="btn btn-primary" onclick="changePassword()"><i class="fas fa-lock"></i> Cambiar contraseña</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const API_BASE = '';

async function api(endpoint, options = {}) {
  const url = API_BASE + '/api' + endpoint;
  const token = sessionStorage.getItem('laguer_token');
  const opts = {
    headers: { 'Content-Type': 'application/json', ...(token ? { 'Authorization': 'Bearer ' + token } : {}) },
    ...options
  };
  if (opts.body && typeof opts.body === 'object') opts.body = JSON.stringify(opts.body);
  try {
    const res = await fetch(url, opts);
    const data = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(data.error || 'Error de servidor');
    return data;
  } catch (e) { throw e; }
}

function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer') || (() => {
    const div = document.createElement('div');
    div.id = 'toastContainer';
    div.style.cssText = 'position:fixed;bottom:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;';
    document.body.appendChild(div);
    return div;
  })();
  const toast = document.createElement('div');
  const colors = { success: '#39b54a', error: '#ee1d25', info: '#189ee0' };
  toast.style.cssText = `background:var(--surface);color:var(--white);padding:12px 16px;border-radius:10px;border:1px solid var(--line);display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.4);animation:fadeIn .3s ease;`;
  toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'times-circle' : 'info-circle'}" style="color:${colors[type]}"></i><span>${message}</span>`;
  container.appendChild(toast);
  setTimeout(() => { toast.style.opacity = '0'; toast.style.transition = 'opacity .4s'; setTimeout(() => toast.remove(), 400); }, 4000);
}

let currentUser = null;

function checkAuth() {
  const raw = sessionStorage.getItem('laguer_currentUser');
  if (!raw) { window.location.href = 'index.html'; return; }
  currentUser = JSON.parse(raw);
  if (currentUser.role === 'admin') { window.location.href = 'admin.html'; return; }
  document.getElementById('userName').textContent = currentUser.name || 'Cliente';
  document.getElementById('userAvatar').textContent = (currentUser.name || 'C').charAt(0).toUpperCase();
  loadProfile();
  loadOrders();
  loadCoupons();
}
checkAuth();

function showPage(id) {
  document.querySelectorAll('.page-section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  const nav = Array.from(document.querySelectorAll('.nav-item')).find(n => n.getAttribute('onclick') && n.getAttribute('onclick').includes(id));
  if (nav) nav.classList.add('active');
  if (id === 'orders') loadOrders();
  if (id === 'coupons') loadCoupons();
}

function logout() {
  sessionStorage.removeItem('laguer_currentUser');
  sessionStorage.removeItem('laguer_token');
  window.location.href = 'index.html';
}

async function loadProfile() {
  try {
    const data = await api('/users/me');
    document.getElementById('profileName').value = data.name || '';
    document.getElementById('profileEmail').value = data.email || '';
    document.getElementById('profilePhone').value = data.phone || '';
    document.getElementById('userName').textContent = data.name || 'Cliente';
    document.getElementById('userAvatar').textContent = (data.name || 'C').charAt(0).toUpperCase();
    currentUser = data;
    sessionStorage.setItem('laguer_currentUser', JSON.stringify(data));
  } catch (e) {
    showToast('Error cargando perfil: ' + e.message, 'error');
  }
}

async function saveProfile() {
  try {
    const payload = {
      name: document.getElementById('profileName').value.trim(),
      phone: document.getElementById('profilePhone').value.trim()
    };
    const data = await api('/users/me', { method: 'PUT', body: payload });
    currentUser = { ...currentUser, ...payload };
    sessionStorage.setItem('laguer_currentUser', JSON.stringify(currentUser));
    document.getElementById('userName').textContent = payload.name;
    document.getElementById('userAvatar').textContent = (payload.name || 'C').charAt(0).toUpperCase();
    showToast('Perfil actualizado', 'success');
  } catch (e) {
    showToast('Error actualizando perfil: ' + e.message, 'error');
  }
}

async function loadOrders() {
  const tbody = document.getElementById('ordersTable');
  try {
    const data = await api('/orders');
    if (!data.orders || !data.orders.length) {
      tbody.innerHTML = '<tr><td colspan="4" class="cell-muted" style="text-align:center;">No tienes pedidos aún.</td></tr>';
      return;
    }
    tbody.innerHTML = data.orders.map(o => `
      <tr>
        <td><strong>#${o.id}</strong></td>
        <td class="cell-muted">${new Date(o.created_at).toLocaleDateString('es-PE')}</td>
        <td>S/ ${Number(o.total).toFixed(2)}</td>
        <td><span class="badge ${o.status === 'completado' ? 'badge-success' : o.status === 'pendiente' ? 'badge-warning' : 'badge-info'}">${o.status}</span></td>
      </tr>
    `).join('');
  } catch (e) {
    tbody.innerHTML = '<tr><td colspan="4" class="cell-muted" style="text-align:center;">Error cargando pedidos.</td></tr>';
  }
}

async function loadCoupons() {
  const container = document.querySelector('#page-coupons .card-body');
  try {
    const data = await api('/coupons');
    if (!data.coupons || !data.coupons.length) {
      container.innerHTML = '<p class="cell-muted" style="text-align:center;">No tienes cupones activos.</p>';
      return;
    }
    container.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;">` + data.coupons.map(c => `
      <div style="background:var(--bg);border:1px solid var(--line);border-radius:12px;padding:16px;">
        <div style="font-weight:700;font-size:16px;color:var(--red);">${c.code}</div>
        <div style="color:var(--muted);font-size:12px;margin-top:4px;">${c.description || 'Cupón de descuento'}</div>
        <div style="margin-top:8px;font-size:12px;">Expira: ${c.expires_at ? new Date(c.expires_at).toLocaleDateString('es-PE') : 'Sin expiración'}</div>
      </div>
    `).join('') + '</div>';
  } catch (e) {
    container.innerHTML = '<p class="cell-muted" style="text-align:center;">Error cargando cupones.</p>';
  }
}

async function changePassword() {
  const current = document.getElementById('currentPass').value;
  const newPass = document.getElementById('newPass').value;
  if (!current || !newPass) { showToast('Completa ambos campos', 'error'); return; }
  try {
    await api('/users/me/password', { method: 'PUT', body: { currentPassword: current, newPassword: newPass } });
    showToast('Contraseña actualizada', 'success');
    document.getElementById('currentPass').value = '';
    document.getElementById('newPass').value = '';
  } catch (e) {
    showToast('Error: ' + e.message, 'error');
  }
}
</script>
</body>
</html>
