<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Carrito · LAGUER</title>
  <link rel="icon" href="../image/favicon-laguer.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* ===== TODOS LOS ESTILOS (igual que tu versión anterior) ===== */
    /* (Mantén los mismos estilos, no los repito por brevedad) */
    /* ... (aquí van todos los estilos que ya tenías, no los cambio) ... */
    /* Para ahorrar espacio, no los repito, pero debes copiarlos de tu versión anterior */
    /* Los estilos son idénticos a los que ya tenías, incluyendo las variables y el responsive */
  </style>
</head>
<body>

  <!-- ===== TOPBAR, HEADER, FOOTER, MODALES (idénticos a tu versión anterior) ===== -->
  <!-- ... (todo igual, solo cambia el script) ... -->

  <!-- ============================================================ -->
  <!-- ===== SCRIPTS COMPLETOS (NUEVA VERSIÓN CON API) ===== -->
  <!-- ============================================================ -->
  <script>
    (function() {
      'use strict';

      // =======================================================================
      // 0. CONFIGURACIÓN
      // =======================================================================
      const API_BASE = '/api';
      const CART_KEY = 'laguerCart';

      // Elementos DOM
      const container = document.getElementById('cartContainer');
      const cartCountEl = document.getElementById('cartCount');
      const bottomCartBadge = document.getElementById('bottomCartBadge');
      const itemCountLabel = document.getElementById('itemCountLabel');

      // =======================================================================
      // 1. OBTENER USUARIO ACTUAL
      // =======================================================================
      let currentUser = null;
      try {
        const userData = localStorage.getItem('laguerUser');
        if (userData) {
          currentUser = JSON.parse(userData);
        }
      } catch (e) {
        console.warn('No se pudo leer la sesión del usuario');
      }

      const isLoggedIn = currentUser && currentUser.id;

      // =======================================================================
      // 2. FUNCIONES DE API
      // =======================================================================
      async function apiFetch(endpoint, options = {}) {
        const resp = await fetch(`${API_BASE}${endpoint}`, {
          ...options,
          headers: {
            'Content-Type': 'application/json',
            ...options.headers
          }
        });
        if (!resp.ok) {
          const error = await resp.json().catch(() => ({ error: 'Error en la API' }));
          throw new Error(error.error || `Error ${resp.status}`);
        }
        return resp.json();
      }

      // =======================================================================
      // 3. OBTENER CARRITO (desde API o localStorage)
      // =======================================================================
      async function fetchCart() {
        if (isLoggedIn && currentUser.id) {
          try {
            const data = await apiFetch(`/cart/${currentUser.id}`);
            return data.cart || [];
          } catch (error) {
            console.error('Error al obtener carrito de API:', error);
            showToast('❌ Error al cargar el carrito desde el servidor', 'error');
            return [];
          }
        } else {
          // Modo invitado: leer de localStorage
          try {
            return JSON.parse(localStorage.getItem(CART_KEY)) || [];
          } catch {
            return [];
          }
        }
      }

      // =======================================================================
      // 4. GUARDAR CARRITO (API o localStorage)
      // =======================================================================
      async function saveCart(cartItems) {
        if (isLoggedIn && currentUser.id) {
          // Para simplificar, en lugar de guardar todo el carrito, sincronizamos
          // eliminando y volviendo a agregar cada item. O mejor: vaciar y agregar.
          // Como la API no tiene un endpoint PUT para reemplazar todo el carrito,
          // hacemos: clear + add cada item.
          try {
            // Vaciar carrito en la API
            await apiFetch(`/cart/clear/${currentUser.id}`, { method: 'DELETE' });
            // Agregar cada item
            for (const item of cartItems) {
              await apiFetch('/cart', {
                method: 'POST',
                body: JSON.stringify({
                  user_id: currentUser.id,
                  producto_id: item.producto_id || item.id,
                  cantidad: item.quantity || 1
                })
              });
            }
            // Recargar el carrito para obtener los IDs correctos
            return await fetchCart();
          } catch (error) {
            console.error('Error al guardar carrito en API:', error);
            showToast('❌ Error al guardar el carrito', 'error');
            return cartItems;
          }
        } else {
          // Modo invitado: guardar en localStorage
          localStorage.setItem(CART_KEY, JSON.stringify(cartItems));
          return cartItems;
        }
      }

      // =======================================================================
      // 5. AÑADIR PRODUCTO AL CARRITO
      // =======================================================================
      async function addToCart(producto_id, cantidad = 1) {
        if (isLoggedIn && currentUser.id) {
          try {
            await apiFetch('/cart', {
              method: 'POST',
              body: JSON.stringify({
                user_id: currentUser.id,
                producto_id: producto_id,
                cantidad: cantidad
              })
            });
            showToast('✅ Producto agregado al carrito', 'success');
            return await fetchCart();
          } catch (error) {
            console.error('Error al agregar a la API:', error);
            showToast('❌ Error al agregar al carrito', 'error');
            return null;
          }
        } else {
          // Modo invitado: localStorage
          let cart = JSON.parse(localStorage.getItem(CART_KEY)) || [];
          const existing = cart.find(item => item.id === producto_id);
          if (existing) {
            existing.quantity = (existing.quantity || 1) + cantidad;
          } else {
            // Necesitamos el nombre y precio para el carrito invitado.
            // Si no tenemos los datos, podemos obtenerlos de la API.
            try {
              const productData = await apiFetch(`/products/${producto_id}`);
              const p = productData.product;
              cart.push({
                id: p.id,
                name: p.nombre,
                price: p.precio,
                image: p.imagen || null,
                quantity: cantidad
              });
            } catch (err) {
              showToast('❌ No se pudo obtener información del producto', 'error');
              return null;
            }
          }
          localStorage.setItem(CART_KEY, JSON.stringify(cart));
          showToast('✅ Producto agregado al carrito', 'success');
          return cart;
        }
      }

      // =======================================================================
      // 6. ELIMINAR ITEM DEL CARRITO
      // =======================================================================
      async function removeItem(cartItemId) {
        if (isLoggedIn && currentUser.id) {
          try {
            await apiFetch(`/cart/${cartItemId}`, { method: 'DELETE' });
            showToast('🗑️ Producto eliminado', 'info');
            return await fetchCart();
          } catch (error) {
            console.error('Error al eliminar de API:', error);
            showToast('❌ Error al eliminar producto', 'error');
            return null;
          }
        } else {
          let cart = JSON.parse(localStorage.getItem(CART_KEY)) || [];
          cart = cart.filter((_, index) => index !== cartItemId); // en localStorage usamos índice
          localStorage.setItem(CART_KEY, JSON.stringify(cart));
          showToast('🗑️ Producto eliminado', 'info');
          return cart;
        }
      }

      // =======================================================================
      // 7. ACTUALIZAR CANTIDAD
      // =======================================================================
      async function updateQuantity(cartItemId, cantidad) {
        if (isLoggedIn && currentUser.id) {
          try {
            // En la API, al hacer POST con el mismo producto y user, se actualiza la cantidad
            // Pero necesitamos saber el producto_id, no el cartItemId.
            // Obtenemos el carrito actual para saber el producto_id.
            const cart = await fetchCart();
            const item = cart.find(i => i.id === cartItemId);
            if (!item) {
              showToast('❌ Producto no encontrado', 'error');
              return null;
            }
            // Usamos POST para actualizar (el endpoint maneja si existe o no)
            await apiFetch('/cart', {
              method: 'POST',
              body: JSON.stringify({
                user_id: currentUser.id,
                producto_id: item.producto_id || item.id,
                cantidad: cantidad
              })
            });
            return await fetchCart();
          } catch (error) {
            console.error('Error al actualizar cantidad en API:', error);
            showToast('❌ Error al actualizar cantidad', 'error');
            return null;
          }
        } else {
          let cart = JSON.parse(localStorage.getItem(CART_KEY)) || [];
          if (cart[cartItemId]) {
            cart[cartItemId].quantity = cantidad;
            localStorage.setItem(CART_KEY, JSON.stringify(cart));
            return cart;
          }
          return null;
        }
      }

      // =======================================================================
      // 8. VACIAR CARRITO
      // =======================================================================
      async function clearCart() {
        if (isLoggedIn && currentUser.id) {
          try {
            await apiFetch(`/cart/clear/${currentUser.id}`, { method: 'DELETE' });
            showToast('🧹 Carrito vaciado', 'info');
            return [];
          } catch (error) {
            console.error('Error al vaciar carrito en API:', error);
            showToast('❌ Error al vaciar el carrito', 'error');
            return null;
          }
        } else {
          localStorage.removeItem(CART_KEY);
          showToast('🧹 Carrito vaciado', 'info');
          return [];
        }
      }

      // =======================================================================
      // 9. MIGRAR CARRITO LOCAL A API (al hacer login)
      // =======================================================================
      async function migrateLocalCartToAPI() {
        if (!isLoggedIn || !currentUser.id) return null;
        const localCart = JSON.parse(localStorage.getItem(CART_KEY)) || [];
        if (localCart.length === 0) return null;

        // Intentar migrar cada item
        let successCount = 0;
        for (const item of localCart) {
          try {
            await apiFetch('/cart', {
              method: 'POST',
              body: JSON.stringify({
                user_id: currentUser.id,
                producto_id: item.id,
                cantidad: item.quantity || 1
              })
            });
            successCount++;
          } catch (err) {
            console.warn('Error al migrar item:', item, err);
          }
        }

        if (successCount > 0) {
          // Limpiar localStorage para no duplicar
          localStorage.removeItem(CART_KEY);
          showToast(`✅ ${successCount} productos migrados a tu cuenta`, 'success');
        }
        return await fetchCart();
      }

      // =======================================================================
      // 10. RENDERIZAR CARRITO
      // =======================================================================
      function renderCart(cart) {
        if (!cart || cart.length === 0) {
          container.innerHTML = `
            <div class="empty-cart fade-in">
              <i class="fas fa-cart-plus"></i>
              <h3 data-i18n="carrito_vacio">Tu carrito está vacío</h3>
              <p data-i18n="explora_productos">¡Explora nuestros productos y agrega lo que más te guste!</p>
              <a href="productos.html" class="add-btn" data-i18n="ver_productos">Ver productos</a>
            </div>
          `;
          updateBadges(0);
          return;
        }

        let itemsHtml = '';
        let subtotal = 0;
        const shipping = 20;

        cart.forEach((item, index) => {
          // Para API, item tiene 'cantidad'; para localStorage, 'quantity'
          const qty = item.cantidad || item.quantity || 1;
          const price = parseFloat(item.precio || item.price || 0);
          const totalItem = price * qty;
          subtotal += totalItem;
          const imgSrc = item.imagen || item.image || '../image/placeholder.png';
          const name = item.nombre || item.name || 'Producto';

          // Usamos item.id para la API, y para localStorage el índice como ID
          const itemId = isLoggedIn ? item.id : index;

          // Construir variantes (si existen)
          let variantHtml = '';
          if (item.color || item.talla) {
            variantHtml = `<div class="variant">`;
            if (item.color) {
              variantHtml += `<span class="color-dot" style="background:${item.color};"></span>`;
            }
            if (item.talla) {
              variantHtml += `<span>${item.talla}</span>`;
            }
            variantHtml += `</div>`;
          }

          const delay = index * 0.08;
          itemsHtml += `
            <div class="cart-item fade-in" data-index="${index}" data-id="${itemId}" style="animation-delay:${delay}s;">
              <div class="cart-item-img">
                <img src="${imgSrc}" alt="${name}" loading="lazy" onerror="this.style.display='none';this.parentElement.innerHTML='<i class=\\'fas fa-box\\'></i>'" />
              </div>
              <div class="cart-item-info">
                <h4>${name}</h4>
                <div class="price">S/ ${totalItem.toFixed(2)}</div>
                ${variantHtml}
              </div>
              <div class="cart-item-actions">
                <button class="qty-btn" data-action="decrease" data-id="${itemId}">−</button>
                <span class="qty">${qty}</span>
                <button class="qty-btn" data-action="increase" data-id="${itemId}">+</button>
                <button class="remove-btn" data-action="remove" data-id="${itemId}" title="Eliminar">
                  <i class="fas fa-trash"></i>
                </button>
              </div>
            </div>
          `;
        });

        const total = subtotal + shipping;
        const totalItems = cart.reduce((acc, item) => acc + (item.cantidad || item.quantity || 1), 0);

        container.innerHTML = `
          <div class="cart-grid">
            <div>${itemsHtml}</div>
            <div>
              <div class="summary-card fade-in" style="animation-delay:0.3s;">
                <h3><i class="fas fa-receipt"></i> <span data-i18n="resumen">Resumen</span></h3>
                <div class="summary-row"><span data-i18n="subtotal">Subtotal</span><span>S/ ${subtotal.toFixed(2)}</span></div>
                <div class="summary-row"><span data-i18n="envio">Envío</span><span>S/ ${shipping.toFixed(2)}</span></div>
                <div class="summary-row total">
                  <span data-i18n="total">Total</span>
                  <span class="amount">S/ ${total.toFixed(2)}</span>
                </div>

                <div class="payment-methods">
                  <p><i class="fas fa-credit-card"></i> <span data-i18n="metodos_pago">Métodos de pago</span></p>
                  <div class="payment-icons">
                    <button data-method="yape"><i class="fas fa-mobile-alt"></i> Yape</button>
                    <button data-method="plin"><i class="fas fa-mobile-alt"></i> Plin</button>
                    <button data-method="tarjeta"><i class="fab fa-cc-visa"></i> Tarjeta</button>
                    <button data-method="paypal"><i class="fab fa-paypal"></i> PayPal</button>
                  </div>
                </div>

                <button class="btn-checkout" id="checkoutBtn">
                  <i class="fas fa-whatsapp"></i> <span data-i18n="pagar_whatsapp">Pagar por WhatsApp</span>
                </button>
                <a href="https://wa.me/51935419810?text=Hola%20LAGUER!%20Quiero%20realizar%20mi%20pedido" class="whatsapp-btn" target="_blank">
                  <i class="fab fa-whatsapp"></i> <span data-i18n="contactar_whatsapp">Contactar por WhatsApp</span>
                </a>
              </div>
            </div>
          </div>
        `;

        // ===== EVENTOS DE CANTIDAD Y ELIMINAR =====
        container.querySelectorAll('.qty-btn, .remove-btn').forEach(btn => {
          btn.addEventListener('click', async function(e) {
            e.stopPropagation();
            const id = this.dataset.id;
            const action = this.dataset.action;
            if (!id) return;

            let currentCart = await fetchCart();
            if (!currentCart) return;

            if (action === 'increase') {
              // Buscar el item actual
              const item = isLoggedIn ? currentCart.find(i => i.id == id) : currentCart[id];
              if (item) {
                const newQty = (item.cantidad || item.quantity || 1) + 1;
                const updated = await updateQuantity(isLoggedIn ? id : parseInt(id), newQty);
                if (updated) {
                  renderCart(updated);
                } else {
                  // Si falla, recargar
                  const reloaded = await fetchCart();
                  if (reloaded) renderCart(reloaded);
                }
              }
            } else if (action === 'decrease') {
              const item = isLoggedIn ? currentCart.find(i => i.id == id) : currentCart[id];
              if (item) {
                const currentQty = item.cantidad || item.quantity || 1;
                if (currentQty > 1) {
                  const newQty = currentQty - 1;
                  const updated = await updateQuantity(isLoggedIn ? id : parseInt(id), newQty);
                  if (updated) renderCart(updated);
                  else {
                    const reloaded = await fetchCart();
                    if (reloaded) renderCart(reloaded);
                  }
                } else {
                  // Eliminar si cantidad es 1
                  const updated = await removeItem(isLoggedIn ? id : parseInt(id));
                  if (updated) renderCart(updated);
                  else {
                    const reloaded = await fetchCart();
                    if (reloaded) renderCart(reloaded);
                  }
                }
              }
            } else if (action === 'remove') {
              const updated = await removeItem(isLoggedIn ? id : parseInt(id));
              if (updated) renderCart(updated);
              else {
                const reloaded = await fetchCart();
                if (reloaded) renderCart(reloaded);
              }
            }
          });
        });

        // ===== ABRIR MODALES =====
        container.querySelectorAll('.payment-icons button').forEach(btn => {
          btn.addEventListener('click', function() {
            const method = this.dataset.method;
            const modalId = {
              'yape': 'modalYape',
              'plin': 'modalPlin',
              'tarjeta': 'modalTarjeta',
              'paypal': 'modalPaypal'
            }[method];
            if (modalId) document.getElementById(modalId).classList.add('active');
          });
        });

        // ===== BOTÓN PAGAR DIRECTO =====
        document.getElementById('checkoutBtn')?.addEventListener('click', function() {
          const cart = currentCart;
          if (!cart || cart.length === 0) { alert('El carrito está vacío'); return; }
          const resumen = cart.map(item => `${item.nombre || item.name} x${item.cantidad || item.quantity || 1}`).join(', ');
          const subtotal = cart.reduce((acc, item) => acc + (parseFloat(item.precio || item.price || 0) * (item.cantidad || item.quantity || 1)), 0);
          const total = subtotal + 20;
          const msg = encodeURIComponent(`Hola LAGUER! Quiero realizar mi pedido:\n${resumen}\nTotal: S/ ${total.toFixed(2)}\nMis datos:\nNombre: \nDirección: \nCelular: `);
          window.open(`https://wa.me/51935419810?text=${msg}`, '_blank');
        });

        updateBadges(totalItems);
      }

      // =======================================================================
      // 11. ACTUALIZAR BADGES
      // =======================================================================
      function updateBadges(totalItems) {
        if (cartCountEl) cartCountEl.textContent = totalItems || 0;
        if (bottomCartBadge) {
          bottomCartBadge.textContent = totalItems || 0;
          bottomCartBadge.style.display = totalItems > 0 ? 'flex' : 'none';
        }
        if (itemCountLabel) itemCountLabel.textContent = `(${totalItems || 0} ${(totalItems || 0) === 1 ? 'producto' : 'productos'})`;
      }

      // =======================================================================
      // 12. TOASTS
      // =======================================================================
      function showToast(message, type = 'info') {
        // Podemos usar el sistema de toast que ya tienes en el index
        // Si no existe, crear uno simple
        const container = document.getElementById('toastContainer');
        if (!container) {
          alert(message);
          return;
        }
        const icons = {
          success: 'fa-check-circle',
          error: 'fa-times-circle',
          info: 'fa-info-circle'
        };
        const toast = document.createElement('div');
        toast.className = `toast ${type}`;
        toast.innerHTML = `<span class="toast-icon"><i class="fas ${icons[type] || icons.info}"></i></span> <span>${message}</span>`;
        container.appendChild(toast);
        setTimeout(() => {
          toast.classList.add('hide');
          setTimeout(() => toast.remove(), 400);
        }, 4000);
      }

      // =======================================================================
      // 13. INICIALIZAR (cargar carrito)
      // =======================================================================
      async function initCart() {
        // Si el usuario está logueado, migrar carrito local y luego cargar de API
        if (isLoggedIn && currentUser.id) {
          // Migrar carrito local a API (si existe)
          await migrateLocalCartToAPI();
          // Cargar carrito de API
          const cart = await fetchCart();
          renderCart(cart);
        } else {
          // Modo invitado: cargar de localStorage
          const cart = await fetchCart();
          renderCart(cart);
        }
      }

      // =======================================================================
      // 14. EVENTOS DE MODALES (igual que antes)
      // =======================================================================
      document.querySelectorAll('.close-modal').forEach(btn => {
        btn.addEventListener('click', function() {
          const modalId = this.dataset.modal;
          document.getElementById(modalId).classList.remove('active');
        });
      });

      document.querySelectorAll('.modal-overlay').forEach(overlay => {
        overlay.addEventListener('click', function(e) {
          if (e.target === this) this.classList.remove('active');
        });
      });

      function sendOrderByWhatsApp(data, method) {
        const cart = currentCart;
        if (!cart || cart.length === 0) { alert('El carrito está vacío'); return; }
        const resumen = cart.map(item => `${item.nombre || item.name} x${item.cantidad || item.quantity || 1}`).join(', ');
        const subtotal = cart.reduce((acc, item) => acc + (parseFloat(item.precio || item.price || 0) * (item.cantidad || item.quantity || 1)), 0);
        const total = subtotal + 20;
        const mensaje = `
Hola LAGUER! Quiero realizar mi pedido:

📦 Productos:
${resumen}

💰 Subtotal: S/ ${subtotal.toFixed(2)}
🚚 Envío: S/ 20.00
💵 Total: S/ ${total.toFixed(2)}

📋 Datos del cliente:
- Nombre: ${data.nombre}
- Correo: ${data.correo}
- Celular: ${data.celular || 'No especificado'}
- Dirección: ${data.direccion}
- Método de pago: ${method}
        `.trim();
        const msg = encodeURIComponent(mensaje);
        window.open(`https://wa.me/51935419810?text=${msg}`, '_blank');
        document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
      }

      // ===== FORMULARIOS DE PAGO =====
      document.getElementById('formYape')?.addEventListener('submit', function(e) {
        e.preventDefault();
        const data = {
          nombre: document.getElementById('yapeNombre').value.trim(),
          correo: document.getElementById('yapeCorreo').value.trim(),
          celular: document.getElementById('yapeCelular').value.trim(),
          direccion: document.getElementById('yapeDireccion').value.trim()
        };
        if (!data.nombre || !data.correo || !data.celular || !data.direccion) {
          alert('Completa todos los campos.');
          return;
        }
        sendOrderByWhatsApp(data, 'Yape');
      });

      document.getElementById('formPlin')?.addEventListener('submit', function(e) {
        e.preventDefault();
        const data = {
          nombre: document.getElementById('plinNombre').value.trim(),
          correo: document.getElementById('plinCorreo').value.trim(),
          celular: document.getElementById('plinCelular').value.trim(),
          direccion: document.getElementById('plinDireccion').value.trim()
        };
        if (!data.nombre || !data.correo || !data.celular || !data.direccion) {
          alert('Completa todos los campos.');
          return;
        }
        sendOrderByWhatsApp(data, 'Plin');
      });

      document.getElementById('formTarjeta')?.addEventListener('submit', function(e) {
        e.preventDefault();
        const data = {
          nombre: document.getElementById('tarjetaNombre').value.trim(),
          correo: document.getElementById('tarjetaCorreo').value.trim(),
          direccion: document.getElementById('tarjetaDireccion').value.trim()
        };
        if (!data.nombre || !data.correo || !data.direccion) {
          alert('Completa todos los campos.');
          return;
        }
        sendOrderByWhatsApp({ ...data, celular: 'N/A' }, 'Tarjeta (Visa/Mastercard)');
      });

      document.getElementById('formPaypal')?.addEventListener('submit', function(e) {
        e.preventDefault();
        const data = {
          nombre: document.getElementById('paypalNombre').value.trim(),
          correo: document.getElementById('paypalCorreo').value.trim(),
          direccion: document.getElementById('paypalDireccion').value.trim()
        };
        if (!data.nombre || !data.correo || !data.direccion) {
          alert('Completa todos los campos.');
          return;
        }
        sendOrderByWhatsApp({ ...data, celular: 'N/A' }, 'PayPal');
      });

      // =======================================================================
      // 15. BÚSQUEDA (redirige)
      // =======================================================================
      document.getElementById('searchInput')?.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') {
          const term = this.value.trim();
          if (term) window.location.href = `productos.html?search=${encodeURIComponent(term)}`;
        }
      });

      // =======================================================================
      // 16. COOKIES
      // =======================================================================
      (function() {
        const COOKIE_KEY = 'laguer_cookie_consent';
        const banner = document.getElementById('cookieBanner');

        function getCookieConsent() { return localStorage.getItem(COOKIE_KEY); }
        function setCookieConsent(value) {
          localStorage.setItem(COOKIE_KEY, value);
          banner.classList.remove('show');
        }

        if (!getCookieConsent()) {
          setTimeout(() => banner.classList.add('show'), 500);
        }

        document.getElementById('cookieAccept')?.addEventListener('click', function() {
          setCookieConsent('accepted');
        });
        document.getElementById('cookieReject')?.addEventListener('click', function() {
          setCookieConsent('rejected');
        });
        document.getElementById('cookieSettings')?.addEventListener('click', function() {
          alert('Configuración de cookies: aquí puedes gestionar tus preferencias.');
        });
      })();

      // =======================================================================
      // 17. TEMA OSCURO/CLARO
      // =======================================================================
      (function() {
        const toggleBtn = document.getElementById('themeToggle');
        const currentTheme = localStorage.getItem('laguer_theme') || 'dark';

        if (currentTheme === 'light') {
          document.body.classList.add('light-mode');
          toggleBtn.innerHTML = '<i class="fas fa-sun"></i>';
        }

        toggleBtn?.addEventListener('click', function() {
          document.body.classList.toggle('light-mode');
          const isLight = document.body.classList.contains('light-mode');
          this.innerHTML = isLight ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
          localStorage.setItem('laguer_theme', isLight ? 'light' : 'dark');
        });
      })();

            const key = el.dataset.i18n;
            el.textContent = translations[lang]?.[key] || translations.es[key] || key;
          });
          document.querySelectorAll('[data-i18n-placeholder]').forEach(el => {

      document.addEventListener('DOMContentLoaded', function() {
        initCart();
        // Actualizar badge de favoritos
        const favs = JSON.parse(localStorage.getItem('laguerFavs')) || [];
        const favCountEl = document.querySelector('.fav-count');
        if (favCountEl) favCountEl.textContent = favs.length;
        // Marcar carrito activo en bottom nav
        document.querySelector('.bottom-nav a[href="carrito.html"]')?.classList.add('active');
        // Guardar referencia al carrito actual para usar en los modales
        window.currentCart = [];
        // Sobrescribir currentCart después de cada render
        const origRender = renderCart;
        renderCart = function(cart) {
          window.currentCart = cart || [];
          origRender(cart);
        };
