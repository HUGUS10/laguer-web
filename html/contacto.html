<section class="section">
  <div class="wrap">
    <h1>Contacta con nosotros</h1>
    <div style="display:grid; grid-template-columns:1fr 1fr; gap:40px; margin-top:30px;">
      <div>
        <form style="display:flex; flex-direction:column; gap:16px;">
          <input type="text" placeholder="Tu nombre" style="padding:12px; border-radius:10px; background:var(--surface); border:1px solid var(--line); color:#fff;">
          <input type="email" placeholder="Correo electrónico" style="padding:12px; border-radius:10px; background:var(--surface); border:1px solid var(--line); color:#fff;">
          <textarea rows="4" placeholder="Mensaje" style="padding:12px; border-radius:10px; background:var(--surface); border:1px solid var(--line); color:#fff;"></textarea>
          <button class="add-btn" style="width:auto; padding:12px 30px;">Enviar mensaje</button>
        </form>
      </div>
      <div>
        <h3>Información</h3>
        <p><strong>📧 Email:</strong> soporte@laguer.com</p>
        <p><strong>📞 Teléfono:</strong> +51 935 419 810</p>
        <p><strong>📍 Lima, Perú</strong></p>
      </div>
    </div>
  </div>
</section>
