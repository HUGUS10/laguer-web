<section class="section" style="display:flex; justify-content:center; align-items:center; min-height:70vh;">
  <div class="wrap" style="max-width:400px;">
    <div class="card" style="padding:32px;">
      <h2 style="text-align:center;">Crear cuenta</h2>
      <form style="display:flex; flex-direction:column; gap:16px; margin-top:20px;">
        <input type="text" placeholder="Nombre completo" style="padding:12px; border-radius:10px; background:var(--surface); border:1px solid var(--line); color:#fff;">
        <input type="email" placeholder="Correo electrónico" style="padding:12px; border-radius:10px; background:var(--surface); border:1px solid var(--line); color:#fff;">
        <input type="password" placeholder="Contraseña" style="padding:12px; border-radius:10px; background:var(--surface); border:1px solid var(--line); color:#fff;">
        <button class="add-btn" style="width:auto; padding:12px;">Registrarme</button>
        <p style="text-align:center;">¿Ya tienes cuenta? <a href="login.html" style="color:var(--blue);">Inicia sesión</a></p>
      </form>
    </div>
  </div>
</section>
